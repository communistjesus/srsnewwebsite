name: Build and deploy Zola website
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1
      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install tailwindcss cli
        run: npm install --no-save tailwindcss @tailwindcss/cli
      - name: build styles
        run: npx @tailwindcss/cli -i ./styles/style.css -o ./static/out.css --minify
      - name: gen events
        run: |
          python scripts/generate_source_events.py
      - name: Build Zola + upload Pages artifact
        uses: getzola/github-pages@066755243e69f508fd1a74739fbf1a65f656c790
        with:
          zola_version: v0.22.1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
